<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Book System</title>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script>

</head>
<body>

    <div class="container">
        <h2>--- GRADE BOOK MENU ---</h2>
        
        <div class="input-section">
            <input type="text" id="studentName" placeholder="Student Name">
            <input type="number" id="studentScore" placeholder="Score (0-100)">
            
            <div class="button-group">
                <button class="btn-add" onclick="addStudent()">1. Add Student</button>
                <button class="btn-export" onclick="exportToCSV()">3. Export to Excel (CSV)</button>
            </div>
        </div>

        <div id="reportArea">
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Score</th>
                        <th>Letter Grade</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
            <div class="average" id="averageDisplay">Class Average: 0</div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Book System</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <h2>--- GRADE BOOK MENU ---</h2>
        
        <div class="input-section">
            <input type="text" id="studentName" placeholder="Enter Name" autofocus>
            <input type="number" id="studentScore" placeholder="Enter Score">
        </div>

        <div class="main-content">
            <div class="report-area">
                <table id="studentTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Score</th>
                            <th>Grade</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
                <div class="average" id="averageDisplay">Class Average: 0</div>
                <button class="btn-export" onclick="exportToCSV()">Download Report (Excel)</button>
            </div>

            <div class="chart-container">
                <canvas id="myPieChart"></canvas>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
